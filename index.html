<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Оплата проживания — QR по ГОСТ (Nayuki)</title>

  <!-- Библиотека Nayuki, готовая ES6-версия для браузера (MIT, бесплатно) [web:252] -->
  <script src="https://github.com/nayuki/QR-Code-generator/releases/download/v1.8.0/qrcodegen-v1.8.0-es6.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 32px 16px;
    }
    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.09);
      padding: 32px 28px;
      width: 100%;
      max-width: 520px;
    }
    h2 {
      text-align: center;
      font-size: 20px;
      color: #1a1a1a;
      margin-bottom: 24px;
    }
    label {
      display: block;
      margin-top: 14px;
      font-weight: 600;
      font-size: 13px;
      color: #444;
      margin-bottom: 4px;
    }
    input, select {
      width: 100%;
      padding: 9px 12px;
      font-size: 15px;
      border: 1.5px solid #d1d5db;
      border-radius: 7px;
      outline: none;
      transition: border-color 0.15s;
      background: #fafafa;
    }
    input:focus, select:focus {
      border-color: #0077cc;
      background: #fff;
    }
    button {
      display: block;
      width: 100%;
      margin-top: 22px;
      padding: 13px;
      font-size: 16px;
      font-weight: 600;
      background: #0077cc;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s;
    }
    button:hover { background: #005fa3; }
    #qr-wrapper {
      text-align: center;
      margin-top: 28px;
    }
    #qr-canvas {
      display: none;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      padding: 12px;
      background: #fff;
      margin: 0 auto;
    }
    #purpose-preview {
      display: none;
      margin-top: 14px;
      font-size: 13px;
      color: #555;
      word-break: break-word;
      text-align: left;
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 6px;
      padding: 10px 12px;
      line-height: 1.6;
    }
    #purpose-preview code {
      display: block;
      margin-top: 6px;
      font-size: 11px;
      color: #6b7280;
      white-space: pre-wrap;
      word-break: break-all;
    }
    .error-msg {
      color: #dc2626;
      font-size: 13px;
      margin-top: 10px;
      text-align: left;
    }
  </style>
</head>
<body>
<div class="card">
  <h2>Оплата проживания (QR по ГОСТ, Nayuki)</h2>

  <label>Дата заезда</label>
  <input type="date" id="dateIn">

  <label>Дата выезда</label>
  <input type="date" id="dateOut">

  <label>E-mail гостя</label>
  <input type="email" id="email" placeholder="guest@example.com">

  <label>Номер комнаты</label>
  <select id="room">
    <option value="" selected>— выберите номер —</option>
    <option value="Г93">Г93</option>
    <option value="Г94">Г94</option>
    <option value="П46">П46</option>
    <option value="П47">П47</option>
    <option value="П1808">П1808</option>
    <option value="П1809">П1809</option>
  </select>

  <label>Сумма оплаты (руб.)</label>
  <input type="number" id="sum" placeholder="5000" min="1" step="1">

  <button type="button" onclick="generateQR()">Сформировать QR-код</button>

  <div id="qr-wrapper">
    <canvas id="qr-canvas"></canvas>
    <div id="purpose-preview"></div>
    <div id="error" class="error-msg"></div>
  </div>
</div>

<script>
  // Реквизиты ИП (полный набор для ГОСТ-строки)
  const IP = {
    Name:        'ИП Мусатова Людмила Ивановна',
    PersonalAcc: '40802810500000020879',
    BankName:    'Банк Глобус (АО)',
    BIC:         '044525473',
    CorrespAcc:  '30101810345250000473',
    PayeeINN:    '500910220717'
  };

  function pad2(n) { return String(n).padStart(2, '0'); }

  function formatDate(iso) {
    if (!iso) return '';
    const p = iso.split('-');
    return p.length === 3 ? `${pad2(p[2])}.${pad2(p[1])}.${p[0]}` : iso;
  }

  function showError(msg) {
    document.getElementById('error').textContent = msg || '';
  }

  function clearError() {
    showError('');
  }

  // Строка -> массив байтов UTF‑8 (Nayuki умеет байтовые сегменты) [web:106][web:221]
  function toUtf8Bytes(str) {
    if (window.TextEncoder) {
      return Array.from(new TextEncoder().encode(str));
    }
    // Фолбэк для старых браузеров (на десктопе/айфоне почти не нужен)
    const bytes = [];
    for (let i = 0; i < str.length; i++) {
      let codePoint = str.charCodeAt(i);
      if (codePoint >= 0xd800 && codePoint <= 0xdbff && i + 1 < str.length) {
        const next = str.charCodeAt(++i);
        if (next >= 0xdc00 && next <= 0xdfff) {
          codePoint = ((codePoint - 0xd800) << 10) + (next - 0xdc00) + 0x10000;
        } else {
          i--;
        }
      }
      if (codePoint <= 0x7f) {
        bytes.push(codePoint);
      } else if (codePoint <= 0x7ff) {
        bytes.push(0xc0 | (codePoint >> 6),
                   0x80 | (codePoint & 0x3f));
      } else if (codePoint <= 0xffff) {
        bytes.push(0xe0 | (codePoint >> 12),
                   0x80 | ((codePoint >> 6) & 0x3f),
                   0x80 | (codePoint & 0x3f));
      } else {
        bytes.push(0xf0 | (codePoint >> 18),
                   0x80 | ((codePoint >> 12) & 0x3f),
                   0x80 | ((codePoint >> 6) & 0x3f),
                   0x80 | (codePoint & 0x3f));
      }
    }
    return bytes;
  }

  function generateQR() {
    const dateIn  = document.getElementById('dateIn').value;
    const dateOut = document.getElementById('dateOut').value;
    const email   = document.getElementById('email').value.trim();
    const roomSel = document.getElementById('room');
    const room    = roomSel.value;
    const sumStr  = document.getElementById('sum').value;

    clearError();

    if (!dateIn || !dateOut) { showError('Укажите даты заезда и выезда'); return; }
    if (!room)               { showError('Выберите номер комнаты'); return; }
    if (!email)              { showError('Укажите e-mail гостя'); return; }
    const sumRub = parseFloat(sumStr);
    if (!sumRub || sumRub <= 0) { showError('Укажите сумму в рублях'); return; }

    const sumKop = Math.round(sumRub * 100);

    // Кириллическое назначение, как вы хотели
    let purpose =
      'Оплата проживания в ' + room +
      ' за период ' + formatDate(dateIn) + '-' + formatDate(dateOut) +
      ', email ' + email;

    // ГОСТ рекомендует <=210 символов в Purpose, обрежем чуть короче [web:31]
    if (purpose.length > 200) {
      purpose = purpose.substring(0, 200);
    }

    const qrString = [
      'ST00012',
      'Name=' + IP.Name,
      'PersonalAcc=' + IP.PersonalAcc,
      'BankName=' + IP.BankName,
      'BIC=' + IP.BIC,
      'CorrespAcc=' + IP.CorrespAcc,
      'PayeeINN=' + IP.PayeeINN,
      'Purpose=' + purpose,
      'Sum=' + sumKop
    ].join('|');

    // Проверка на наличие библиотеки
    if (typeof qrcodegen === 'undefined' || !qrcodegen.QrCode) {
      showError('Библиотека qrcodegen не загрузилась (проверьте доступ к github.com).');
      return;
    }

    const QRC = qrcodegen.QrCode;
    const QRS = qrcodegen.QrSegment;

    // Кодируем ГОСТ-строку как байты UTF‑8 и отдаём в Nayuki [web:106][web:221]
    const dataBytes = toUtf8Bytes(qrString);
    const seg = QRS.makeBytes(dataBytes);

    let qr;
    try {
      qr = QRC.encodeSegments([seg], QRC.Ecc.L, 1, 40, -1, true);
    } catch (e) {
      showError('Ошибка генерации QR (данные слишком длинные): ' + (e && e.message ? e.message : String(e)));
      return;
    }

    const size = qr.size;
    const scale = 6;      // пикселей на модуль
    const border = 4;     // модулей «тихой зоны»

    const canvas = document.getElementById('qr-canvas');
    const ctx = canvas.getContext('2d');

    canvas.width  = (size + border * 2) * scale;
    canvas.height = (size + border * 2) * scale;

    // Белый фон
    ctx.fillStyle = '#FFFFFF';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Чёрные модули
    ctx.fillStyle = '#000000';
    for (let y = 0; y < size; y++) {
      for (let x = 0; x < size; x++) {
        if (qr.getModule(x, y)) {
          ctx.fillRect((x + border) * scale, (y + border) * scale, scale, scale);
        }
      }
    }

    canvas.style.display = 'block';

    const prev = document.getElementById('purpose-preview');
    prev.style.display = 'block';
    prev.innerHTML =
      '<b>Назначение платежа:</b> ' + purpose +
      '<code>' + qrString + '</code>';
  }
</script>
</body>
</html>
