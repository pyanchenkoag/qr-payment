<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Оплата проживания — QR (Nayuki)</title>

  <!-- Только Nayuki QR Code generator [web:106] -->
  <script src="https://github.com/nayuki/QR-Code-generator/releases/download/v1.8.0/qrcodegen-v1.8.0-es6.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 32px 16px;
    }
    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.09);
      padding: 32px 28px;
      width: 100%;
      max-width: 520px;
    }
    h2 {
      text-align: center;
      font-size: 20px;
      color: #1a1a1a;
      margin-bottom: 24px;
    }
    label {
      display: block;
      margin-top: 14px;
      font-weight: 600;
      font-size: 13px;
      color: #444;
      margin-bottom: 4px;
    }
    input, select {
      width: 100%;
      padding: 9px 12px;
      font-size: 15px;
      border: 1.5px solid #d1d5db;
      border-radius: 7px;
      outline: none;
      transition: border-color 0.15s;
      background: #fafafa;
    }
    input:focus, select:focus {
      border-color: #0077cc;
      background: #fff;
    }
    button {
      display: block;
      width: 100%;
      margin-top: 22px;
      padding: 13px;
      font-size: 16px;
      font-weight: 600;
      background: #0077cc;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s;
    }
    button:hover { background: #005fa3; }
    #qr-wrapper {
      text-align: center;
      margin-top: 28px;
    }
    #qr-canvas {
      display: none;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      padding: 12px;
      background: #fff;
      margin: 0 auto;
    }
    #purpose-preview {
      display: none;
      margin-top: 14px;
      font-size: 13px;
      color: #555;
      word-break: break-word;
      text-align: left;
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 6px;
      padding: 10px 12px;
      line-height: 1.6;
    }
    #purpose-preview code {
      display: block;
      margin-top: 6px;
      font-size: 11px;
      color: #6b7280;
      white-space: pre-wrap;
      word-break: break-all;
    }
    .error-msg {
      color: #dc2626;
      font-size: 13px;
      margin-top: 10px;
      text-align: left;
    }
  </style>
</head>
<body>
<div class="card">
  <h2>Оплата проживания (реквизиты кириллицей, Purpose латиницей)</h2>

  <label>Дата заезда</label>
  <input type="date" id="dateIn">

  <label>Дата выезда</label>
  <input type="date" id="dateOut">

  <label>E-mail гостя</label>
  <input type="email" id="email" placeholder="guest@example.com">

  <label>Номер комнаты</label>
  <select id="room">
    <option value="" selected>— выберите номер —</option>
    <option value="G93">Г93</option>
    <option value="G94">Г94</option>
    <option value="P46">П46</option>
    <option value="P47">П47</option>
    <option value="P1808">П1808</option>
    <option value="P1809">П1809</option>
  </select>

  <label>Сумма оплаты (руб.)</label>
  <input type="number" id="sum" placeholder="5000" min="1" step="1">

  <button type="button" onclick="generateQR()">Сформировать QR-код</button>

  <div id="qr-wrapper">
    <canvas id="qr-canvas"></canvas>
    <div id="purpose-preview"></div>
    <div id="error" class="error-msg"></div>
  </div>
</div>

<script>
  // Реквизиты ИП — кириллица
  const IP = {
    Name:        'ИП Мусатова Людмила Ивановна',
    PersonalAcc: '40802810500000020879',
    BankName:    'Банк Глобус (АО)',
    BIC:         '044525473',
    CorrespAcc:  '30101810345250000473',
    PayeeINN:    '500910220717'
  };

  function pad2(n) { return String(n).padStart(2, '0'); }
  function formatDate(iso) {
    if (!iso) return '';
    const p = iso.split('-');
    return p.length === 3 ? `${pad2(p[2])}.${pad2(p[1])}.${p[0]}` : iso;
  }
  function showError(msg) {
    document.getElementById('error').textContent = msg || '';
  }
  function clearError() { showError(''); }

  function generateQR() {
    const dateIn  = document.getElementById('dateIn').value;
    const dateOut = document.getElementById('dateOut').value;
    const email   = document.getElementById('email').value.trim();
    const room    = document.getElementById('room').value; // G93/P46…
    const sumStr  = document.getElementById('sum').value;

    clearError();

    if (!dateIn || !dateOut) { showError('Укажите даты заезда и выезда'); return; }
    if (!room)               { showError('Выберите номер комнаты'); return; }
    if (!email)              { showError('Укажите e-mail гостя'); return; }
    const sumRub = parseFloat(sumStr);
    if (!sumRub || sumRub <= 0) { showError('Укажите сумму в рублях'); return; }

    const sumKop = Math.round(sumRub * 100);

    // Purpose латиницей, с полным email: "<room> 20.03-22.03, user@mail.ru"
    const d1 = formatDate(dateIn);
    const d2 = formatDate(dateOut);
    let purpose = room + ' ' + d1 + '-' + d2 + ', ' + email;

    // Лёгкое ограничение по длине, чтобы не раздувать строку
    if (purpose.length > 80) {
      purpose = purpose.substring(0, 80);
    }

    const qrString = [
      'ST00012',
      'Name=' + IP.Name,
      'PersonalAcc=' + IP.PersonalAcc,
      'BankName=' + IP.BankName,
      'BIC=' + IP.BIC,
      'CorrespAcc=' + IP.CorrespAcc,
      'PayeeINN=' + IP.PayeeINN,
      'Purpose=' + purpose,
      'Sum=' + sumKop
    ].join('|');

    if (typeof qrcodegen === 'undefined' || !qrcodegen.QrCode) {
      showError('Библиотека qrcodegen не загрузилась (проверьте доступ к github.com).');
      return;
    }

    const QRC = qrcodegen.QrCode;

    let qr;
    try {
      // Nayuki сам выбирает версию и кодирует Unicode [web:106]
      qr = QRC.encodeText(qrString, QRC.Ecc.LOW);
    } catch (e) {
      showError('Ошибка генерации QR: ' + (e && e.message ? e.message : String(e)));
      return;
    }

    const size = qr.size;
    const scale = 6;
    const border = 4;

    const canvas = document.getElementById('qr-canvas');
    const ctx = canvas.getContext('2d');

    canvas.width  = (size + border * 2) * scale;
    canvas.height = (size + border * 2) * scale;

    ctx.fillStyle = '#FFFFFF';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = '#000000';
    for (let y = 0; y < size; y++) {
      for (let x = 0; x < size; x++) {
        if (qr.getModule(x, y)) {
          ctx.fillRect((x + border) * scale, (y + border) * scale, scale, scale);
        }
      }
    }

    canvas.style.display = 'block';

    const prev = document.getElementById('purpose-preview');
    prev.style.display = 'block';
    prev.innerHTML =
      '<b>Назначение (латиница):</b> ' + purpose +
      '<code>' + qrString + '</code>';
  }
</script>
</body>
</html>
